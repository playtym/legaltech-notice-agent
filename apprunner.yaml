version: 1.0
runtime: python311

build:
  commands:
    build:
      - pip3 install --no-cache-dir -r requirements.txt --target /app

run:
  command: python3 -m uvicorn legaltech.app:app --host 0.0.0.0 --port 8000 --timeout-keep-alive 120 --app-dir src
  network:
    port: 8000
  env:
    - name: USE_BEDROCK
      value: "true"
    - name: AWS_REGION
      value: "ap-south-1"
    - name: BEDROCK_MODEL_ID
      value: "apac.anthropic.claude-sonnet-4-20250514-v1:0"
    - name: BEDROCK_FAST_MODEL_ID
      value: "apac.anthropic.claude-3-5-haiku-20241022-v1:0"
    - name: REQUEST_TIMEOUT_SECONDS
      value: "60"
    - name: LEGALTECH_USER_AGENT
      value: "Lawly/0.2 (+https://lawly.store)"
    - name: DATA_BUCKET
      value: "lawly-data-prod"
    - name: ADMIN_PASSWORD
      value: "lawly2024"
    - name: BING_WEBMASTER_API_KEY
      value: "ec74915dca1748b58ea80f42ab2cf5bb"
