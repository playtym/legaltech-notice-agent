version: 1.0
runtime: python311

build:
  commands:
    build:
      - pip3 install -r requirements.txt

run:
  command: python3 -m uvicorn legaltech.app:app --host 0.0.0.0 --port 8000 --app-dir src
  network:
    port: 8000
  env:
    - name: USE_BEDROCK
      value: "true"
    - name: AWS_REGION
      value: "ap-south-1"
    - name: BEDROCK_MODEL_ID
      value: "apac.anthropic.claude-sonnet-4-20250514-v1:0"
    - name: REQUEST_TIMEOUT_SECONDS
      value: "20"
    - name: LEGALTECH_USER_AGENT
      value: "LegalTech-Notice-Agent/0.2"
